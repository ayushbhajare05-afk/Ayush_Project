<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Navbar -->

    <header>
      <div class="navbar">
        <div class="logo">
          <h2>amazon</h2>
        </div>

        <div class="location">
          Deliver to<br />
          <b>India</b>
        </div>

        <div class="search">
          <input type="text" placeholder="Search Amazon" />
          <button>Search</button>
        </div>

        <div class="account">
          Hello, Sign in <br />
          <b>Account & Lists</b>
        </div>

        <div class="orders">
          Returns <br />
          <b>& Orders</b>
        </div>

        <div class="cart">🛒 Cart</div>
      </div>

      <div class="menu">
        <a href="#">All</a>
        <a href="#">Today's Deals</a>
        <a href="#">Customer Service</a>
        <a href="#">Registry</a>
        <a href="#">Gift Cards</a>
        <a href="#">Sell</a>
      </div>
    </header>

    <!-- Hero Section -->

    <section class="hero">
      <h1>Welcome to Amazon Clone</h1>
    </section>

    <!-- Products -->

    <section class="products">
      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Gaming Laptop</p>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Smartphone</p>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Headphones</p>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Smart Watch</p>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Camera</p>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200" />
        <p>Keyboard</p>
      </div>
    </section>

    <!-- Footer -->

    <footer>
      <p>Amazon Clone © 2026</p>
    </footer>
  </body>
</html>
